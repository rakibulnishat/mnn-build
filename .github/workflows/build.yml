name: Build MNN Libraries for Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout MNN
      uses: actions/checkout@v4
      with:
        repository: alibaba/MNN
        ref: master
        
    - name: Setup Android NDK r21e
      run: |
        wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
        unzip -q android-ndk-r25c-linux.zip
        echo "ANDROID_NDK=$(pwd)/android-ndk-r25c" >> $GITHUB_ENV
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential
        
    - name: Build MNN Core only
      run: |
        mkdir -p build_android
        cd build_android
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-26 \
          -DMNN_LOW_MEMORY=true \
          -DMNN_BUILD_LLM=true \
          -DMNN_SUPPORT_TRANSFORMER_FUSE=true \
          -DMNN_ARM82=false \
          -DMNN_OPENCL=false \
          -DMNN_BUILD_SHARED_LIBS=true \
          -DMNN_BUILD_CONVERTER=false \
          -DMNN_BUILD_TOOLS=false \
          -DMNN_BUILD_DEMO=false \
          -DCMAKE_BUILD_TYPE=Release
        make -j2
        
    - name: Collect libraries
      run: |
        mkdir -p output/lib
        find build_android -name "*.so" | xargs -I{} cp {} output/lib/ 2>/dev/null || true
        ls -la output/lib/
        
    - name: Upload libraries
      uses: actions/upload-artifact@v4
      with:
        name: mnn-android-libs
        path: output/
        retention-days: 7
